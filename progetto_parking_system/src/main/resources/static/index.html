<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkSync - Smart Parking Manager</title>
    <meta name="description" content="Gestisci parcheggi, veicoli e abbonamenti con facilità.">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="toast-container" class="toast-container"></div>

    <!-- Login/Register View -->
    <!-- Login/Register View -->
    <div id="auth-view" class="view auth-container active">
        <div class="glass-panel auth-box">
            <div class="auth-header">
                <i class="fa-solid fa-car-side logo-icon"></i>
                <h1>Welcome to <span>ParkSync</span></h1>
                <p>Accedi al sistema gestionale</p>
            </div>

            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Registrati</button>
                <button id="tab-gate" class="tab-btn" onclick="switchAuthTab('gate')">Gate Access</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-username"><i class="fa-solid fa-user"></i> Username</label>
                    <input type="text" id="login-username" required placeholder="Inserisci username">
                </div>
                <div class="input-group">
                    <label for="login-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" id="login-password" required placeholder="Inserisci password">
                </div>
                <button type="submit" class="btn-primary">Accedi <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="reg-username"><i class="fa-solid fa-user"></i> Username</label>
                    <input type="text" id="reg-username" required placeholder="Scegli un username">
                </div>
                <div class="input-group">
                    <label for="reg-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" id="reg-password" required minlength="6" placeholder="Almeno 6 caratteri">
                </div>
                <div class="input-group">
                    <label for="reg-subscription"><i class="fa-solid fa-ticket"></i> Scegli Abbonamento</label>
                    <select id="reg-subscription" style="width:100%; padding: 0.8rem; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:#fff; font-family: 'Inter', sans-serif;">
                        <option value="">Nessun Abbonamento</option>
                        <option value="MONTHLY">Mensile</option>
                        <option value="QUARTERLY">Trimestrale</option>
                        <option value="YEARLY">Annuale</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-accent">Registrati <i
                        class="fa-solid fa-user-plus"></i></button>
            </form>

            <!-- Gate Form -->
            <div id="gate-form" class="auth-form" style="max-height: 400px; overflow-y: auto;">
                <p style="text-align:center; color:var(--text-muted); margin-bottom:1rem; font-size: 0.9rem;">Accesso occasionale (Senza Abbonamento)</p>
                <div id="gate-checkin-section">
                    <div class="input-group">
                        <label for="gate-plate"><i class="fa-solid fa-car"></i> Targa</label>
                        <input type="text" id="gate-plate" placeholder="Es. AB123CD">
                    </div>
                    <div class="input-group">
                        <label for="gate-type"><i class="fa-solid fa-truck"></i> Tipo Veicolo</label>
                        <select id="gate-type" style="width:100%; padding: 0.8rem; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:#fff; font-family: 'Inter', sans-serif;">
                            <option value="CAR">Auto</option>
                            <option value="MOTORBIKE">Moto</option>
                            <option value="ELECTRIC_CAR">Auto Elettrica</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex-direction:row; align-items:center;">
                        <input type="checkbox" id="gate-disability" style="width:auto; margin-right: 10px;">
                        <label for="gate-disability" style="margin:0;">Disabilità (104)</label>
                    </div>
                    <button type="button" onclick="handleGateCheckIn()" class="btn-primary" style="margin-top:1rem;">Check-In <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                </div>

                <div id="gate-checkout-section" style="margin-top:2rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:1rem;">
                    <h4 style="margin-bottom: 10px; text-align: center;">Fai il Check-Out</h4>
                    <div class="input-group">
                        <label for="gate-out-qr"><i class="fa-solid fa-qrcode"></i> Token QR (Ricevuto al Check-in)</label>
                        <input type="text" id="gate-out-qr" placeholder="Inserisci token">
                    </div>
                    <div class="input-group">
                        <label for="gate-out-plate"><i class="fa-solid fa-car"></i> Targa Veicolo</label>
                        <input type="text" id="gate-out-plate" placeholder="Es. AB123CD">
                    </div>
                    <button type="button" onclick="handleGateCheckOut()" class="btn-primary btn-accent" style="margin-top:1rem;">Check-Out <i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view dashboard-wrapper">
        <aside class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i class="fa-solid fa-car-side"></i> ParkSync
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="loadSection('dashboard')">
                    <i class="fa-solid fa-house"></i> Dashboard
                </button>
                <button class="nav-item" onclick="loadSection('vehicles')">
                    <i class="fa-solid fa-car"></i> I Miei Veicoli
                </button>
                <button class="nav-item" onclick="loadSection('parkings')">
                    <i class="fa-solid fa-square-parking"></i> Parcheggi
                </button>
                <button class="nav-item" onclick="loadSection('reservations')">
                    <i class="fa-solid fa-calendar-check"></i> Prenotazioni
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                    <span id="display-username">Utente</span>
                </div>
                <button id="logout-btn" class="btn-danger-outline" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Esci
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <h2 id="page-title">Dashboard Overview</h2>
                <div class="header-actions">
                    <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                    <button class="icon-btn" onclick="fetchData()"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
            </header>

            <div class="content-area" id="main-content-area">
                <!-- Data will be dynamically rendered here -->
                <div class="dashboard-stats">
                    <div class="stat-card glass-panel">
                        <div class="stat-icon"><i class="fa-solid fa-car"></i></div>
                        <div class="stat-details">
                            <h3>Veicoli Registrati</h3>
                            <p id="stat-vehicles">0</p>
                        </div>
                    </div>
                    <div class="stat-card glass-panel">
                        <div class="stat-icon purple"><i class="fa-solid fa-ticket"></i></div>
                        <div class="stat-details">
                            <h3>Prenotazioni Attive</h3>
                            <p id="stat-reservations">0</p>
                        </div>
                    </div>
                </div>

                <div class="data-section mt-4 hidden" id="vehicles-section">
                    <div class="section-header">
                        <h3>I Miei Veicoli</h3>
                        <button class="btn-primary btn-sm" onclick="openAddVehicleModal()"><i
                                class="fa-solid fa-plus"></i> Aggiungi</button>
                    </div>
                    <div class="grid-container" id="vehicles-grid">
                        <!-- Cards injected via JS -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Vehicle -->
    <div id="vehicle-modal" class="view auth-container"
        style="display:none; position:fixed; z-index:9000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div class="glass-panel auth-box" style="margin: auto; max-height:90vh; overflow-y:auto;">
            <div class="auth-header">
                <h2>Aggiungi Veicolo</h2>
            </div>
            <form id="add-vehicle-form" class="auth-form active">
                <div class="input-group">
                    <label>Targa</label>
                    <input type="text" id="veh-targa" required>
                </div>
                <div class="input-group">
                    <label>Modello</label>
                    <input type="text" id="veh-modello" required>
                </div>
                <div class="input-group">
                    <label>Tipo (Auto, Moto...)</label>
                    <input type="text" id="veh-tipo" required>
                </div>
                <div style="display:flex; gap:10px;">
                    <button type="button" class="btn-danger-outline" onclick="closeAddVehicleModal()">Annulla</button>
                    <button type="submit" class="btn-primary" style="flex:1;">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
